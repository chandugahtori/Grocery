# ============================================================
#  Navix Grocery Store — GitHub Actions CI/CD Pipeline
# ============================================================
#
#  Stages:
#   1. backend-ci   → lint (flake8) + unit tests (pytest) with real Postgres
#   2. frontend-ci  → eslint + vite build check
#   3. docker-push  → build & push multi-platform images to Docker Hub
#                     (only on push to main, after both CI jobs pass)
#   4. deploy       → SSH into your server & docker-compose pull + up
#                     (only on push to main, after docker-push)
#
#  Required GitHub Secrets  (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   — your Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub Access Token (not password)
#   DEPLOY_HOST          — IP or hostname of your production server
#   DEPLOY_USER          — SSH username on that server (e.g. ubuntu)
#   DEPLOY_SSH_KEY       — Private SSH key (paste the full -----BEGIN ... block)
#   DEPLOY_PATH          — Absolute path to the project on the server (e.g. /opt/navix)
#
# ============================================================

name: Navix CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────
# 1. BACKEND  — Lint + Tests
# ────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-fastapi

    # Spin up a real Postgres so async DB tests work
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: test

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-fastapi/requirements.txt

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio httpx

      - name: 🔍 Lint with flake8
        run: |
          flake8 app \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.git

      - name: 🧪 Run tests
        run: |
          # Run pytest if tests exist, otherwise skip gracefully
          if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping pytest."
          fi

  # ────────────────────────────────────────────────────────────
  # 2. FRONTEND  — Lint + Build
  # ────────────────────────────────────────────────────────────
  frontend-ci:
    name: ⚛️  Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint with ESLint
        run: npm run lint -- --max-warnings=0
        # Remove --max-warnings=0 if you want to allow warnings

      - name: 🏗️  Production build
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  # ────────────────────────────────────────────────────────────
  # 3. DOCKER  — Build & Push to Docker Hub
  #    Only runs on push to main after both CI jobs pass
  # ────────────────────────────────────────────────────────────
  docker-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate short SHA tag so every image is traceable
      - name: 🏷️  Compute image tag
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 🐳 Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-fastapi
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/navix-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/navix-backend:${{ steps.tag.outputs.sha }}

      - name: 🐳 Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/navix-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/navix-frontend:${{ steps.tag.outputs.sha }}

      # Post a summary to the Actions run
      - name: 📋 Image summary
        run: |
          echo "### 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| navix-backend  | \`latest\`, \`${{ steps.tag.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| navix-frontend | \`latest\`, \`${{ steps.tag.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # 4. DEPLOY  — SSH → docker-compose pull + up
  #    Only runs after docker-push succeeds
  #    Requires DEPLOY_* secrets to be set
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: ⬇️ Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: 🔐 Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 🚀 Deploy via SSH
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_ON_SERVER: ${{ secrets.DEPLOY_PATH }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" << 'ENDSSH'
            set -e
            cd "$PATH_ON_SERVER"

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🔄 Recreating containers (zero-downtime)..."
            docker compose up -d --remove-orphans

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete — $(date)"
          ENDSSH

      - name: 🩺 Health check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Waiting 15s for containers to warm up..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$HOST/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
            echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "App is live at http://$HOST" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Health check failed — got HTTP $STATUS"
            echo "### ❌ Health Check Failed (HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
