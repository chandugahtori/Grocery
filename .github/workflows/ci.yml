name: Navix CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Frontend (React)
  frontend-ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint & Test
        working-directory: ./frontend
        run: |
          npm run lint || echo "No lint script found"
          # npm test  # Agar tests likhe hain toh isse uncomment kar dena

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  # Job 2: Backend (FastAPI)
  backend-ci-cd:
    runs-on: ubuntu-latest
    needs: frontend-ci-cd # Frontend pass hoga tabhi backend check hoga
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Backend Deps
        working-directory: ./backend-fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Linting (Flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
